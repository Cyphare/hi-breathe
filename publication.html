<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications - Breathe Lab</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header id="site-header"></header>

    <div class="page-title-banner">
        <h2>Research Publications</h2>
    </div>

    <main class="publication-main">
        <div class="container relative-container">
            
            <div class="pub-top-bar">
                <div class="pub-breadcrumb">
                </div>
                
                <div class="pub-controls">
                    <div class="sort-container">
                        <button class="control-btn" id="sortBtn">Sort</button>
                        
                        <div class="sort-dropdown" id="sortDropdown">
                            <div class="sort-group" id="sortType">
                                <button class="sort-option active">Name</button>
                                <button class="sort-option">Year</button>
                            </div>
                            <hr class="sort-divider">
                            <div class="sort-group" id="sortOrder">
                                <button class="sort-option">Ascending</button>
                                <button class="sort-option active">Descending</button>
                            </div>
                            <div class="sort-actions">
                                <button class="sort-confirm-btn" id="sortConfirmBtn" type="button">Confirm</button>
                            </div>
                        </div>
                    </div>

                    <div class="search-container">
                        <input type="text" class="control-btn search-input" placeholder="Search">
                        <button class="search-confirm-btn" id="searchConfirmBtn" type="button">Confirm</button>
                    </div>
                </div>
            </div>

            <div class="pub-list">
                <div class="pub-card" id="pub-1">
                    <div class="pub-info">
                        <h3 class="pub-title">Publication Title</h3>
                        <p class="pub-authors">Authors</p>
                        <p class="pub-journal">Journal</p>
                    </div>
                    <div class="pub-meta">
                        <p class="pub-year">(Year)</p>
                        <div class="pub-links">
                            <a href="publication.html#pub-1" class="pub-link-btn">PDF</a>
                            <a href="publication.html#pub-1" class="pub-link-btn">DOI</a>
                        </div>
                    </div>
                </div>

                <div class="pub-card" id="pub-2">
                    <div class="pub-info">
                        <h3 class="pub-title">Publication Title</h3>
                        <p class="pub-authors">Authors</p>
                        <p class="pub-journal">Journal</p>
                    </div>
                    <div class="pub-meta">
                        <p class="pub-year">(Year)</p>
                        <div class="pub-links">
                            <a href="publication.html#pub-2" class="pub-link-btn">PDF</a>
                            <a href="publication.html#pub-2" class="pub-link-btn">DOI</a>
                        </div>
                    </div>
                </div>

                <div class="pub-card" id="pub-3">
                    <div class="pub-info">
                        <h3 class="pub-title">Publication Title</h3>
                        <p class="pub-authors">Authors</p>
                        <p class="pub-journal">Journal</p>
                    </div>
                    <div class="pub-meta">
                        <p class="pub-year">(Year)</p>
                        <div class="pub-links">
                            <a href="publication.html#pub-3" class="pub-link-btn">PDF</a>
                            <a href="publication.html#pub-3" class="pub-link-btn">DOI</a>
                        </div>
                    </div>
                </div>

                <div class="pub-card" id="pub-4">
                    <div class="pub-info">
                        <h3 class="pub-title">Publication Title</h3>
                        <p class="pub-authors">Authors</p>
                        <p class="pub-journal">Journal</p>
                    </div>
                    <div class="pub-meta">
                        <p class="pub-year">(Year)</p>
                        <div class="pub-links">
                            <a href="publication.html#pub-4" class="pub-link-btn">PDF</a>
                            <a href="publication.html#pub-4" class="pub-link-btn">DOI</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
